<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <nav class="nav">
        <ul class="nav-list">
            <li><a href="index.html" class="nav-link">Home</a></li>

            <li><a href="page3.html" class="nav-link">History</a></li>

    <aside class="side-menu">
        <a href="index.html" class="side-link">Home</a>
        <a href="page2.html" class="side-link">Tutorials</a>
        <a href="page3.html" class="side-link">History</a>
    </aside>
    <main>
        <div class="content-card">
            <h1>Welcome to Philippine Artistry</h1>
            <p>Please log in to explore the history section.</p>
            <form id="loginForm" style="margin-top:20px;">
                <input type="text" id="user" placeholder="Username" required style="display:block; margin-bottom:10px; padding:8px;">
                <input type="password" id="pass" placeholder="Password" required style="display:block; margin-bottom:10px; padding:8px;">
                <button type="submit" style="padding:10px 20px; background:#5d4037; color:white; border:none; cursor:pointer;">Log In</button>
            </form>
        </div>
    </main>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (document.getElementById('user').value === 'admin' && document.getElementById('pass').value === 'password') {
                window.location.href = 'page3.html';
            } else { alert('Incorrect credentials (admin/password).'); }
        });
    </script>
</body>
</html>
